<script>
    let answers = {};

    // Меняем тип поля телефона на text, чтобы убрать любые блокировки браузеров
    document.addEventListener("DOMContentLoaded", function() {
        const phoneInput = document.getElementById('userPhone');
        if (phoneInput) {
            phoneInput.setAttribute('type', 'text');
        }
    });

    function nextStep(stepNumber, answer) {
        const currentStep = stepNumber - 1;
        answers[`Шаг_${currentStep}`] = answer;

        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${stepNumber}`).classList.add('active');

        const progressPercent = (stepNumber / 4) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';
    }

    function sendData(event) {
        event.preventDefault();
        
        const quizContainer = document.querySelector('.quiz-container');
        const submitBtn = event.target.querySelector('.submit-btn');
        submitBtn.innerText = 'Отправка данных...';
        submitBtn.disabled = true;
        
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        
        // ВШИТЫЕ ДАННЫЕ ТВОЕГО БОТА И ТВОЕГО ID
        const TELEGRAM_BOT_TOKEN = '8974552125:AAFBeFbWQ4Y469ei5EGI1Jq3oJ4e7uq39yE'; 
        const TELEGRAM_CHAT_ID = '8991974658'; 

        const message = `🔥 **НОВЫЙ ЛИД НА БАНКРОТСТВО** 🔥\n\n👤 **ФИО:** ${name}\n📞 **Телефон:** ${phone}\n💰 **Сумма долга:** ${answers['Шаг_1'] || 'Не указано'}\n🚨 **Просрочки:** ${answers['Шаг_2'] || 'Не указано'}\n🏠 **Имущество:** ${answers['Шаг_3'] || 'Не указано'}`;

        const url = `https://telegram.org{TELEGRAM_BOT_TOKEN}/sendMessage`;
        
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        })
        .then(response => {
            if(response.ok) {
                // Вывод сообщения об успешной отправке
                quizContainer.innerHTML = `
                    <div style="text-align: center; padding: 40px 10px;">
                        <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                        <h2 style="margin-bottom: 15px;">Данные успешно отправлены!</h2>
                        <p style="color: var(--text-muted); font-size: 16px; line-height: 1.5;">
                            Анализ вашего дела запущен. <br>В ближайшее время с вами свяжутся ведущие юристы по банкротству для составления плана защиты.
                        </p>
                    </div>
                `;
            } else {
                alert('Ошибка отправки. Убедись, что ты зашел в своего бота в Telegram и нажал кнопку СТАРТ (/start).');
                submitBtn.innerText = 'Получить разбор в Telegram →';
                submitBtn.disabled = false;
            }
        })
        .catch(err => {
            console.error(err);
            alert('Сбой сети. Проверь интернет.');
            submitBtn.innerText = 'Получить разбор в Telegram →';
            submitBtn.disabled = false;
        });
    }
</script>
